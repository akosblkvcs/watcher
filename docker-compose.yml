name: watcher

services:
  postgres:
    image: postgres:18-alpine
    container_name: watcher-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: watcher
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - watcher-pgdata:/var/lib/postgresql

volumes:
  watcher-pgdata:
