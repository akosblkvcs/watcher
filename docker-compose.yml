name: watcher

services:
  postgres:
    image: postgres:18-alpine
    container_name: watcher-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: watcher
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - watcher-pgdata:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d watcher"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  watcher-pgdata:
