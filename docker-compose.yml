name: watcher

services:
  db:
    image: postgres:16
    container_name: watcher-db
    environment:
      POSTGRES_DB: watcher
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - watcher_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d watcher"]
      interval: 5s
      timeout: 5s
      retries: 20

  web:
    container_name: watcher-web
    image: watcher-web:latest
    build:
      context: .
      target: development
    environment:
      FLASK_DEBUG: "1"
      DATABASE_URL: postgresql://postgres:postgres@db:5432/watcher
    ports:
      - "8000:8000"
    volumes:
      - ./src:/app/src
      - ./alembic:/app/alembic
      - ./alembic.ini:/app/alembic.ini
      - ./pyproject.toml:/app/pyproject.toml
    depends_on:
      db:
        condition: service_healthy

volumes:
  watcher_pgdata: