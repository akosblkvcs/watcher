name: watcher

services:
  db:
    image: postgres:16
    container_name: watcher-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: watcher
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - watcher_pgdata:/var/lib/postgresql/data

volumes:
  watcher_pgdata:
